<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>常用漢字 2136 · 일본 상용한자 학습</title>
<style>
  :root{
    --ink:#23201c;          /* 먹 */
    --paper:#f4efe3;        /* 화선지 */
    --paper-2:#ebe3d2;
    --indigo:#27425f;       /* 쪽빛 */
    --indigo-2:#36567a;
    --vermilion:#c14233;    /* 주(朱) 도장 */
    --vermilion-soft:#d9695b;
    --green:#4f7256;        /* 정답 */
    --line:rgba(35,32,28,.14);
    --muted:#7a7165;
    --grid:rgba(35,32,28,.10);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;
    -webkit-font-smoothing:antialiased;
    line-height:1.5;
    background-image:
      linear-gradient(var(--grid) 1px,transparent 1px),
      linear-gradient(90deg,var(--grid) 1px,transparent 1px);
    background-size:26px 26px;
  }
  .wrap{max-width:560px;margin:0 auto;padding:18px 16px 60px;min-height:100%}
  /* header */
  header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .brand{display:flex;align-items:baseline;gap:9px}
  .seal{
    font-family:"Noto Serif JP",serif;font-weight:700;
    background:var(--vermilion);color:var(--paper);
    width:38px;height:38px;display:grid;place-items:center;border-radius:6px;
    font-size:20px;box-shadow:0 1px 0 rgba(0,0,0,.2);align-self:center;
    writing-mode:vertical-rl;line-height:1;letter-spacing:-2px;padding-top:2px;
  }
  .brand h1{font-size:17px;font-weight:800;letter-spacing:-.2px}
  .brand .sub{font-size:11.5px;color:var(--muted);font-weight:600}
  /* tabs */
  .tabs{display:flex;gap:6px;background:var(--paper-2);padding:5px;border-radius:11px;margin-bottom:14px}
  .tabs button{
    flex:1;border:0;background:transparent;padding:9px 4px;border-radius:8px;
    font-size:13.5px;font-weight:700;color:var(--muted);cursor:pointer;font-family:inherit;
    transition:all .15s;
  }
  .tabs button.on{background:var(--indigo);color:var(--paper);box-shadow:0 2px 6px rgba(39,66,95,.3)}
  /* filters */
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .filters .grp{display:flex;flex-direction:column;gap:4px}
  .filters label{font-size:10.5px;font-weight:700;color:var(--muted);letter-spacing:.4px;text-transform:uppercase}
  .filters select{
    font-family:inherit;font-size:13px;font-weight:600;color:var(--ink);
    background:var(--paper);border:1.5px solid var(--line);border-radius:8px;padding:7px 9px;
  }
  .count{margin-left:auto;align-self:flex-end;font-size:12px;color:var(--muted);font-weight:600}
  .count b{color:var(--vermilion);font-size:14px}
  /* kanji card */
  .card{
    background:var(--paper);border:1.5px solid var(--line);border-radius:16px;
    padding:22px;box-shadow:0 6px 20px rgba(35,32,28,.07);position:relative;
  }
  .meta-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .badges{display:flex;gap:6px;flex-wrap:wrap}
  .badge{font-size:10.5px;font-weight:800;padding:3px 8px;border-radius:99px;letter-spacing:.3px}
  .badge.jlpt{background:var(--indigo);color:var(--paper)}
  .badge.grade{background:var(--paper-2);color:var(--indigo)}
  .badge.str{background:transparent;color:var(--muted);border:1.5px solid var(--line)}
  .pos{font-size:12px;color:var(--muted);font-weight:700}
  /* the glyph w/ practice grid */
  .glyph-box{
    width:184px;height:184px;margin:8px auto 4px;position:relative;
    border:2px solid var(--indigo);border-radius:10px;
    background:
      linear-gradient(var(--indigo-2) .5px,transparent .5px) center/100% 50% no-repeat,
      linear-gradient(90deg,var(--indigo-2) .5px,transparent .5px) center/50% 100% no-repeat;
    display:grid;place-items:center;overflow:hidden;
  }
  .glyph-box::before,.glyph-box::after{
    content:"";position:absolute;inset:0;pointer-events:none;
    background:repeating-linear-gradient(var(--dir),transparent 0 5px,var(--indigo-2) 5px 9px);
    opacity:.32;
  }
  .glyph-box::before{--dir:to bottom;width:0;left:50%;border-left:1px dashed var(--indigo-2);background:none;opacity:.5}
  .glyph-box::after{--dir:to right;height:0;top:50%;border-top:1px dashed var(--indigo-2);background:none;opacity:.5}
  .glyph{font-family:"Noto Serif JP","Hiragino Mincho ProN","Yu Mincho",serif;font-size:118px;line-height:1;color:var(--ink);z-index:1;font-weight:500}
  .glyph.sm{font-size:60px}
  /* reveal area */
  .reveal{margin-top:14px;min-height:96px}
  .ans-line{display:flex;gap:10px;padding:9px 0;border-bottom:1px dashed var(--line);align-items:baseline}
  .ans-line:last-child{border-bottom:0}
  .ans-line .k{font-size:11px;font-weight:800;color:var(--vermilion);width:54px;flex-shrink:0;letter-spacing:.3px;padding-top:2px}
  .ans-line .v{font-size:18px;font-weight:600;font-family:"Noto Serif JP","Hiragino Mincho ProN",serif}
  .ans-line .v.mean{font-family:inherit;font-size:17px;font-weight:700}
  .ans-line .v .en{display:block;font-size:12.5px;font-weight:500;color:var(--muted);margin-top:2px;font-family:inherit}
  .hidden-hint{text-align:center;color:var(--muted);font-size:13px;padding:30px 0;font-weight:600}
  /* buttons */
  .btn-row{display:flex;gap:10px;margin-top:16px}
  .btn{
    flex:1;border:0;border-radius:11px;padding:13px;font-size:14.5px;font-weight:800;
    cursor:pointer;font-family:inherit;transition:transform .08s,filter .15s;
  }
  .btn:active{transform:translateY(1px)}
  .btn.primary{background:var(--indigo);color:var(--paper)}
  .btn.ghost{background:var(--paper-2);color:var(--ink)}
  .btn.know{background:var(--green);color:#fff}
  .btn.dunno{background:var(--vermilion);color:#fff}
  .btn:disabled{opacity:.4;cursor:default}
  /* quiz */
  .q-prompt{text-align:center;margin:6px 0 16px}
  .q-prompt .label{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:6px}
  .q-prompt .big{font-family:"Noto Serif JP","Hiragino Mincho ProN",serif;font-size:78px;line-height:1.1}
  .q-prompt .big.mean{font-size:24px;font-weight:700;font-family:inherit;padding:14px 8px}
  .opts{display:grid;gap:10px}
  .opt{
    border:1.5px solid var(--line);background:var(--paper);border-radius:12px;padding:14px;
    font-size:18px;font-weight:600;cursor:pointer;font-family:"Noto Serif JP",serif;text-align:center;
    transition:all .12s;color:var(--ink);
  }
  .opt.mean{font-family:inherit;font-size:15px;font-weight:600}
  .opt:hover{border-color:var(--indigo)}
  .opt.correct{background:var(--green);color:#fff;border-color:var(--green)}
  .opt.wrong{background:var(--vermilion);color:#fff;border-color:var(--vermilion)}
  .opt.dim{opacity:.45}
  .opt:disabled{cursor:default}
  .scorebar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-size:13px;font-weight:700}
  .scorebar .s-ok{color:var(--green)}
  .scorebar .s-no{color:var(--vermilion)}
  .streak{font-size:12px;color:var(--muted);font-weight:700}
  /* stats */
  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
  .stat{background:var(--paper);border:1.5px solid var(--line);border-radius:14px;padding:16px}
  .stat .n{font-size:30px;font-weight:800;font-family:"Noto Serif JP",serif;line-height:1}
  .stat .n.v{color:var(--vermilion)}.stat .n.i{color:var(--indigo)}.stat .n.g{color:var(--green)}
  .stat .l{font-size:12px;color:var(--muted);font-weight:700;margin-top:6px}
  .progress{height:10px;background:var(--paper-2);border-radius:99px;overflow:hidden;margin:4px 0 16px}
  .progress>i{display:block;height:100%;background:linear-gradient(90deg,var(--indigo),var(--vermilion));border-radius:99px;transition:width .4s}
  .review-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
  .review-list .ch{
    font-family:"Noto Serif JP",serif;font-size:26px;width:48px;height:48px;display:grid;place-items:center;
    background:var(--paper);border:1.5px solid var(--vermilion-soft);border-radius:9px;cursor:pointer;color:var(--ink);
  }
  .sec-title{font-size:13px;font-weight:800;margin:18px 0 8px;letter-spacing:.2px;display:flex;align-items:center;gap:8px}
  .sec-title::before{content:"";width:14px;height:14px;background:var(--vermilion);border-radius:3px;display:inline-block}
  .empty{color:var(--muted);font-size:13px;font-weight:600;padding:8px 0}
  .reset{background:transparent;border:1.5px solid var(--line);color:var(--muted);font-size:12px;font-weight:700;
    padding:8px 14px;border-radius:8px;cursor:pointer;font-family:inherit;margin-top:20px}
  .tip{font-size:11.5px;color:var(--muted);text-align:center;margin-top:14px;font-weight:600;line-height:1.7}
  .pill-toggle{display:flex;gap:6px;margin-bottom:14px}
  .pill-toggle button{
    flex:1;border:1.5px solid var(--line);background:var(--paper);border-radius:9px;padding:9px 4px;
    font-size:12.5px;font-weight:700;color:var(--muted);cursor:pointer;font-family:inherit;
  }
  .pill-toggle button.on{background:var(--vermilion);color:#fff;border-color:var(--vermilion)}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>

<script>
const $=s=>document.querySelector(s);
const view=$('#view');

/* ---------- 가나 변환 ---------- */
// 히라가나 → 카타카나 (음독 표기 관습)
const toKata=s=>s.replace(/[\u3041-\u3096]/g,c=>String.fromCharCode(c.charCodeAt(0)+0x60));
// 읽기 정리: ".": 송가나 경계 → "·", "-": 접사 → 표시 제거하고 점만
function fmtKun(r){return r.replace(/\./g,'・').replace(/-/g,'');}
function fmtOn(r){return toKata(r.replace(/[.\-]/g,''));}

/* ---------- 상태 ---------- */
let state={tab:'learn',pool:[],idx:0,revealed:false,
  quizType:'mean', quiz:null, ok:0,no:0,streak:0,
  prog:{}, stats:{seen:0,ok:0,no:0,wrong:{}} };

/* ---------- 영구 저장 (있으면 사용) ---------- */
async function load(){
  try{
    const p=await window.storage.get('kanji_prog');
    if(p&&p.value){const d=JSON.parse(p.value);state.prog=d.prog||{};state.stats=d.stats||state.stats;}
  }catch(e){/* 저장소 없음 → 메모리만 */}
}
let saveT;
function save(){
  clearTimeout(saveT);
  saveT=setTimeout(async()=>{
    try{await window.storage.set('kanji_prog',JSON.stringify({prog:state.prog,stats:state.stats}));}catch(e){}
  },400);
}

/* ---------- 풀 구성 ---------- */
function buildPool(){
  const g=$('#fGrade').value, j=$('#fJlpt').value;
  state.pool=KANJI.filter(k=>(!g||String(k.g)===g)&&(!j||String(k.j)===j));
  $('#poolN').textContent=state.pool.length;
  state.idx=0;state.revealed=false;
}
const cur=()=>state.pool[state.idx];
const rnd=a=>a[Math.floor(Math.random()*a.length)];
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

/* ---------- 렌더: 학습 ---------- */
function renderLearn(){
  if(!state.pool.length){view.innerHTML='<div class="card"><p class="empty">조건에 맞는 한자가 없어요. 필터를 바꿔보세요.</p></div>';return;}
  const k=cur();
  const learned=state.prog[k.c]==='ok';
  view.innerHTML=`
   <div class="card">
     <div class="meta-row">
       <div class="badges">
         ${k.j?`<span class="badge jlpt">N${k.j}</span>`:''}
         <span class="badge grade">${k.g===8?'중학+':'소'+k.g}</span>
         <span class="badge str">${k.s}획</span>
       </div>
       <div class="pos">${state.idx+1} / ${state.pool.length}${learned?' · ✓익힘':''}</div>
     </div>
     <div class="glyph-box"><span class="glyph${k.c.length>1?' sm':''}">${k.c}</span></div>
     <div class="reveal" id="rev">
       ${state.revealed?ansHTML(k):'<p class="hidden-hint">탭하거나 «뜻 보기»를 눌러 정답 확인</p>'}
     </div>
     ${state.revealed?`
       <div class="btn-row">
         <button class="btn dunno" id="bNo">아직 몰라요</button>
         <button class="btn know" id="bOk">외웠어요</button>
       </div>
       <div class="btn-row"><button class="btn ghost" id="bNext">건너뛰기 →</button></div>
     `:`
       <div class="btn-row">
         <button class="btn ghost" id="bPrev">← 이전</button>
         <button class="btn primary" id="bShow">뜻 보기</button>
         <button class="btn ghost" id="bSkip">다음 →</button>
       </div>
     `}
   </div>`;
  if(state.revealed){
    $('#bOk').onclick=()=>mark('ok');
    $('#bNo').onclick=()=>mark('no');
    $('#bNext').onclick=next;
  }else{
    $('#glyph-tap')&&0;
    $('.glyph-box').onclick=showAns;
    $('#bShow').onclick=showAns;
    $('#bPrev').onclick=prev;
    $('#bSkip').onclick=next;
  }
}
function ansHTML(k){
  return `
   <div class="ans-line"><span class="k">뜻</span><span class="v mean">${k.km.join(' · ')}<span class="en">${k.m.join(', ')}</span></span></div>
   <div class="ans-line"><span class="k">음독</span><span class="v">${k.on.length?k.on.map(fmtOn).join('　'):'—'}</span></div>
   <div class="ans-line"><span class="k">훈독</span><span class="v">${k.kun.length?k.kun.map(fmtKun).join('　'):'—'}</span></div>`;
}
function showAns(){state.revealed=true;renderLearn();}
function mark(r){
  const k=cur();
  if(state.prog[k.c]!==r) state.stats.seen=Object.keys({...state.prog,[k.c]:r}).length;
  state.prog[k.c]=r;
  if(r==='no') state.stats.wrong[k.c]=1; else delete state.stats.wrong[k.c];
  save();next();
}
function next(){state.idx=(state.idx+1)%state.pool.length;state.revealed=false;renderLearn();}
function prev(){state.idx=(state.idx-1+state.pool.length)%state.pool.length;state.revealed=false;renderLearn();}

/* ---------- 렌더: 퀴즈 ---------- */
function makeQuiz(){
  if(state.pool.length<4){state.quiz=null;return;}
  const ans=rnd(state.pool);
  const type=state.quizType;
  let distract;
  if(type==='read'){
    // 보기는 읽기(음독 우선, 없으면 훈독)
    const reading=k=>{const o=k.on.map(fmtOn),u=k.kun.map(fmtKun);return o[0]||u[0]||'';};
    const right=reading(ans);
    const seen=new Set([right]);
    distract=[];
    for(const k of shuffle(state.pool)){const r=reading(k);if(r&&!seen.has(r)){seen.add(r);distract.push(r);}if(distract.length===3)break;}
    state.quiz={type,glyph:ans.c,right,opts:shuffle([right,...distract]),meanFmt:false};
  }else if(type==='mean'){
    const right=ans.km[0];const seen=new Set([right]);distract=[];
    for(const k of shuffle(state.pool)){const m=k.km[0];if(m&&!seen.has(m)){seen.add(m);distract.push(m);}if(distract.length===3)break;}
    state.quiz={type,glyph:ans.c,right,opts:shuffle([right,...distract]),meanFmt:true};
  }else{ // mean2glyph: 뜻 보고 한자
    const right=ans.c;const seen=new Set([right]);distract=[];
    for(const k of shuffle(state.pool)){if(!seen.has(k.c)){seen.add(k.c);distract.push(k.c);}if(distract.length===3)break;}
    state.quiz={type,prompt:ans.km.join(' · '),right,opts:shuffle([right,...distract]),glyphOpts:true,refC:ans.c};
  }
}
function renderQuiz(){
  if(state.pool.length<4){view.innerHTML='<div class="card"><p class="empty">퀴즈는 4자 이상 필요해요. 필터 범위를 넓혀주세요.</p></div>';return;}
  if(!state.quiz) makeQuiz();
  const q=state.quiz;
  const total=state.ok+state.no;
  view.innerHTML=`
    <div class="pill-toggle">
      <button data-qt="mean" class="${state.quizType==='mean'?'on':''}">한자→뜻</button>
      <button data-qt="read" class="${state.quizType==='read'?'on':''}">한자→읽기</button>
      <button data-qt="m2g" class="${state.quizType==='m2g'?'on':''}">뜻→한자</button>
    </div>
    <div class="card">
      <div class="scorebar">
        <span><span class="s-ok">맞음 ${state.ok}</span> · <span class="s-no">틀림 ${state.no}</span> ${total?`(${Math.round(state.ok/total*100)}%)`:''}</span>
        <span class="streak">🔥 연속 ${state.streak}</span>
      </div>
      <div class="q-prompt">
        <div class="label">${q.type==='read'?'이 한자의 읽기는?':q.type==='mean'?'이 한자의 뜻은?':'이 뜻을 가진 한자는?'}</div>
        ${q.glyphOpts
          ? `<div class="big mean">${q.prompt}</div>`
          : `<div class="big">${q.glyph}</div>`}
      </div>
      <div class="opts" id="opts">
        ${q.opts.map((o,i)=>`<button class="opt${q.glyphOpts?'':(q.meanFmt?' mean':'')}" data-i="${i}" data-v="${encodeURIComponent(o)}">${o}</button>`).join('')}
      </div>
    </div>`;
  document.querySelectorAll('.pill-toggle button').forEach(b=>b.onclick=()=>{
    state.quizType=({mean:'mean',read:'read',m2g:'m2g'})[b.dataset.qt];state.quiz=null;renderQuiz();});
  document.querySelectorAll('.opt').forEach(b=>b.onclick=()=>answer(b));
}
function answer(btn){
  const q=state.quiz;
  const chosen=decodeURIComponent(btn.dataset.v);
  const correct=chosen===q.right;
  document.querySelectorAll('.opt').forEach(b=>{
    b.disabled=true;
    const v=decodeURIComponent(b.dataset.v);
    if(v===q.right)b.classList.add('correct');
    else if(b===btn)b.classList.add('wrong');
    else b.classList.add('dim');
  });
  const refChar=q.glyphOpts?q.refC:q.glyph;
  if(correct){state.ok++;state.streak++;state.stats.ok++;delete state.stats.wrong[refChar];}
  else{state.no++;state.streak=0;state.stats.no++;state.stats.wrong[refChar]=1;}
  save();
  setTimeout(()=>{state.quiz=null;renderQuiz();},correct?650:1300);
}

/* ---------- 렌더: 통계 ---------- */
function renderStats(){
  const learned=Object.values(state.prog).filter(v=>v==='ok').length;
  const total=state.stats.ok+state.stats.no;
  const acc=total?Math.round(state.stats.ok/total*100):0;
  const wrong=Object.keys(state.stats.wrong);
  const pct=Math.round(learned/2136*100);
  const byMap=Object.fromEntries(KANJI.map(k=>[k.c,k]));
  view.innerHTML=`
    <div class="stat-grid">
      <div class="stat"><div class="n i">${learned}</div><div class="l">외운 한자 / 2136</div></div>
      <div class="stat"><div class="n g">${acc}%</div><div class="l">퀴즈 정답률</div></div>
      <div class="stat"><div class="n v">${total}</div><div class="l">푼 퀴즈 수</div></div>
      <div class="stat"><div class="n">${wrong.length}</div><div class="l">복습할 한자</div></div>
    </div>
    <div class="progress"><i style="width:${pct}%"></i></div>
    <div class="sec-title">복습이 필요한 한자</div>
    ${wrong.length?`<div class="review-list">${wrong.slice(0,80).map(c=>`<span class="ch" data-c="${c}">${c}</span>`).join('')}</div>
       ${wrong.length>80?`<p class="empty">외 ${wrong.length-80}자 더</p>`:''}`
      :'<p class="empty">아직 틀린 한자가 없어요. 학습이나 퀴즈를 시작해보세요.</p>'}
    <button class="reset" id="bReset">진행 기록 초기화</button>`;
  document.querySelectorAll('.review-list .ch').forEach(el=>el.onclick=()=>{
    const k=byMap[el.dataset.c];if(!k)return;
    // 해당 한자만 학습 카드로
    state.pool=[k];state.idx=0;state.revealed=false;state.tab='learn';
    document.querySelectorAll('.tabs button').forEach(b=>b.classList.toggle('on',b.dataset.tab==='learn'));
    render();
  });
  $('#bReset').onclick=async()=>{
    if(!confirm('외운 기록과 퀴즈 통계를 모두 지울까요?'))return;
    state.prog={};state.stats={seen:0,ok:0,no:0,wrong:{}};state.ok=state.no=state.streak=0;
    try{await window.storage.delete('kanji_prog');}catch(e){}
    renderStats();
  };
}

/* ---------- 라우팅 ---------- */
function render(){
  if(state.tab==='learn')renderLearn();
  else if(state.tab==='quiz'){state.quiz=null;renderQuiz();}
  else renderStats();
  $('#tip').textContent= state.tab==='quiz'
    ? '음독은 カタカナ, 훈독은 ひらがな로 표기됩니다. · 「・」는 보내는 가나(送り仮名) 경계'
    : state.tab==='learn'
    ? '카드를 탭하면 뜻·음독·훈독이 나와요. 데이터: KANJIDIC 기반 공개 데이터셋'
    : '한자를 누르면 그 글자만 다시 학습할 수 있어요.';
}
document.querySelectorAll('.tabs button').forEach(b=>b.onclick=()=>{
  state.tab=b.dataset.tab;
  document.querySelectorAll('.tabs button').forEach(x=>x.classList.toggle('on',x===b));
  render();
});
$('#fGrade').onchange=()=>{buildPool();state.quiz=null;render();};
$('#fJlpt').onchange=()=>{buildPool();state.quiz=null;render();};

/* ---------- 시작 ---------- */
(async()=>{await load();buildPool();render();})();
</script>
